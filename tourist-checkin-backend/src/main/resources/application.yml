server:
  port: 8080

spring:
  application:
    name: tourist-checkin

  datasource:
    url: jdbc:mysql://localhost:3306/tourist_checkin?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000
      pool-name: TouristCheckinHikariCP

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 90MB

mybatis-plus:
  configuration:
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.slf4j.Slf4jImpl}
    map-underscore-to-camel-case: true
  mapper-locations: classpath:/mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置 (生产环境请使用环境变量: export JWT_SECRET=xxx)
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}  # 24小时

# 文件存储配置 (本地存储)
file:
  storage:
    path: ${FILE_STORAGE_PATH:./uploads}  # 本地存储路径
    access-url: ${FILE_ACCESS_URL:/uploads/}  # 访问URL前缀

# 阿里云OSS配置 (已弃用，改用本地存储)
# aliyun:
#   oss:
#     endpoint: ${OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
#     access-key-id: ${OSS_ACCESS_KEY_ID:}
#     access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
#     bucket-name: ${OSS_BUCKET_NAME:}

# 高德地图配置
amap:
  key: ${AMAP_KEY:}

# 微信小程序配置（替换为你的实际值）
wx:
  appid: ${WX_APPID}
  secret: ${WX_SECRET}

# 服务基础URL（用于返回绝对路径的文件URL，小程序端必须）
base-url: ${BASE_URL:http://localhost:8080}

# 日志配置
logging:
  level:
    com.travel.mapper: debug

# CORS 跨域配置
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Redis 配置
spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: ${REDIS_DATABASE:0}
  timeout: 5000ms
  lettuce:
    pool:
      max-active: 8
      max-idle: 8
      min-idle: 2
      max-wait: 2000ms

# 邮件配置
spring.mail:
  host: ${MAIL_HOST:smtp.qq.com}
  port: ${MAIL_PORT:465}
  username: ${MAIL_USERNAME:}
  password: ${MAIL_PASSWORD:}
  properties:
    mail:
      smtp:
        ssl:
          enable: true
        auth: true
        socketFactory:
          port: 465
          class: javax.net.ssl.SSLSocketFactory
